name: Build and Deploy APT Repo to gh-pages

on:
  push:
    branches: [ main ]
  watch:
    types: [started]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg
          pip3 install termux-apt-repo

      - name: Create directories
        run: |
          mkdir -p debs repo
          rm -rf debs/* repo/*

      - name: Build .deb packages
        run: |
          for pkg_dir in packages/*/; do
            if [ -f "${pkg_dir}/DEBIAN/control" ]; then
              echo "Building package from ${pkg_dir}"
              dpkg-deb -b -Zxz "${pkg_dir}" debs/
            fi
          done
          ls -la debs/

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PRIVATE_GPG_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate APT repository
        run: termux-apt-repo debs repo termuxvoid main -s

      - name: Verify signature
        run: |
          gpg --list-keys
          gpg --verify repo/dists/termuxvoid/InRelease

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./repo
          keep_files: false
